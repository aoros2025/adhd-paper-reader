<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paper Brain — CREAR Lab meeting actions</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #2b2b33;
    --soft: #6b6b76;
    --accent: #c2602e;
    --accent-soft: #fdeee4;
    --line: #e8e2d8;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    font-size: 17px;
  }
  main { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { font-family: Georgia, serif; font-size: 2rem; margin: 0 0 4px; }
  .tagline { color: var(--soft); margin: 0 0 16px; }
  nav { margin-bottom: 32px; font-size: .9rem; }
  nav a { color: var(--accent); text-decoration: none; margin-right: 16px; }
  nav a.current { color: var(--ink); font-weight: 600; pointer-events: none; }
  nav a:hover { text-decoration: underline; }

  textarea {
    width: 100%; min-height: 200px; resize: vertical;
    font: inherit; color: inherit;
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px 18px;
  }
  textarea:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }

  .mode-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .mode-label { color: var(--soft); font-size: .9rem; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--card); }
  .seg button {
    all: unset; padding: 9px 18px; cursor: pointer; font-size: .95rem;
  }
  .seg button.active { background: var(--accent); color: #fff; }
  .seg button:not(.active):hover { background: var(--accent-soft); }

  .actions { display: flex; align-items: center; gap: 14px; margin-top: 14px; }
  #go {
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 12px 22px; font-size: 1rem; font-weight: 600;
    cursor: pointer;
  }
  #go:hover { filter: brightness(1.08); }
  #go:disabled { opacity: .5; cursor: default; }

  #loading { display: none; text-align: center; padding: 36px 0; }
  .spinner {
    width: 36px; height: 36px; margin: 0 auto 16px;
    border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { color: var(--soft); }

  #error-box {
    display: none;
    background: #fdf0ef; border: 1px solid #eccfcb; color: #8a3a2e;
    border-radius: var(--radius); padding: 16px 20px; margin-top: 24px;
  }

  #results { display: none; }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px 24px; margin-top: 20px;
  }
  .label {
    display: inline-block; font-size: .75rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  .group-title { font-weight: 700; font-size: 1.05rem; margin: 18px 0 6px; }
  .group-title:first-of-type { margin-top: 4px; }
  ul.items { list-style: none; padding: 0; margin: 0; }
  ul.items li {
    padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
    margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline;
  }
  .action-text { flex: 1 1 100%; }
  .chip {
    font-size: .78rem; padding: 2px 10px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--soft);
  }
  .chip.deadline { background: var(--accent-soft); border-color: #f3d9c8; color: #8a4a22; }
  .chip.high   { background: #fdeaea; border-color: #f0c4c4; color: #a33; font-weight: 600; }
  .chip.medium { background: #fdf6e3; border-color: #ecdcae; color: #8a6d1a; }
  .chip.low    { background: #eef3ee; border-color: #cfdccf; color: #4a6b4a; }
  ul.plain { padding-left: 22px; margin: 0; }
  ul.plain li { margin-bottom: 6px; }
</style>
</head>
<body>
<main>
  <h1>Paper Brain</h1>
  <p class="tagline">Paste CREAR Lab meeting notes or a transcript. Get every action item, decision, and follow-up — organized.</p>
  <nav>
    <a href="/">Read a paper</a>
    <a href="/write">Notes → paragraph</a>
    <a href="/lab" class="current">Meeting → actions</a>
  </nav>

  <textarea id="notes" placeholder="Paste raw meeting notes or a transcript here. Nothing gets invented — only what was actually said gets extracted."></textarea>

  <div class="mode-row">
    <span class="mode-label">Organize</span>
    <div class="seg" id="mode-seg">
      <button data-mode="person" class="active">By person</button>
      <button data-mode="study">By study</button>
      <button data-mode="hub">By hub</button>
    </div>
  </div>

  <div class="actions">
    <button id="go">Extract action items</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Reading the notes…</p>
  </div>

  <div id="error-box"></div>

  <div id="results">
    <div class="card">
      <span class="label">Action items</span>
      <div id="groups"></div>
    </div>
    <div class="card" id="decisions-card">
      <span class="label">Decisions made</span>
      <ul class="plain" id="decisions"></ul>
    </div>
    <div class="card" id="unassigned-card">
      <span class="label">Mentioned but unassigned</span>
      <ul class="plain" id="unassigned"></ul>
    </div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let mode = "person";

document.querySelectorAll("#mode-seg button").forEach((b) => {
  b.addEventListener("click", () => {
    document.querySelectorAll("#mode-seg button").forEach((x) => x.classList.remove("active"));
    b.classList.add("active");
    mode = b.dataset.mode;
  });
});

const LOADING_MSGS = [
  "Reading the notes…",
  "Hunting down every to-do…",
  "Sorting out who said they'd do what…",
];
let msgTimer = null;

function setLoading(on) {
  $("loading").style.display = on ? "block" : "none";
  $("go").disabled = on;
  if (on) {
    let i = 0;
    $("loading-msg").textContent = LOADING_MSGS[0];
    msgTimer = setInterval(() => {
      i = (i + 1) % LOADING_MSGS.length;
      $("loading-msg").textContent = LOADING_MSGS[i];
    }, 3500);
  } else if (msgTimer) {
    clearInterval(msgTimer);
    msgTimer = null;
  }
}

function showError(msg) {
  const box = $("error-box");
  box.textContent = msg;
  box.style.display = "block";
}

function render(data) {
  const groups = $("groups");
  groups.innerHTML = "";
  (data.groups || []).forEach((g) => {
    const h = document.createElement("div");
    h.className = "group-title";
    h.textContent = g.label;
    groups.appendChild(h);
    const ul = document.createElement("ul");
    ul.className = "items";
    (g.items || []).forEach((it) => {
      const li = document.createElement("li");
      const span = document.createElement("span");
      span.className = "action-text";
      span.textContent = it.action;
      li.appendChild(span);
      if (it.deadline) {
        const d = document.createElement("span");
        d.className = "chip deadline";
        d.textContent = "📅 " + it.deadline;
        li.appendChild(d);
      }
      const p = document.createElement("span");
      p.className = "chip " + it.priority;
      p.textContent = it.priority;
      li.appendChild(p);
      ul.appendChild(li);
    });
    groups.appendChild(ul);
  });

  const fillList = (id, items) => {
    const ul = $(id);
    ul.innerHTML = "";
    items.forEach((t) => {
      const li = document.createElement("li");
      li.textContent = t;
      ul.appendChild(li);
    });
    $(id + "-card").style.display = items.length ? "block" : "none";
  };
  fillList("decisions", data.decisions || []);
  fillList("unassigned", data.unassigned || []);

  $("results").style.display = "block";
}

async function extract() {
  const notes = $("notes").value.trim();
  if (!notes) {
    showError("Paste some meeting notes first.");
    return;
  }
  $("error-box").style.display = "none";
  $("results").style.display = "none";
  setLoading(true);
  try {
    const res = await fetch("/api/actions", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ notes, mode }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    render(data);
  } catch (err) {
    showError(err.message || "Something went wrong. Try again.");
  } finally {
    setLoading(false);
  }
}

$("go").addEventListener("click", extract);
$("notes").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") extract();
});
</script>
</body>
</html>
