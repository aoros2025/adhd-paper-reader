<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paper Brain — notes to academic paragraph</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #2b2b33;
    --soft: #6b6b76;
    --accent: #c2602e;
    --accent-soft: #fdeee4;
    --line: #e8e2d8;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    font-size: 17px;
  }
  main { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { font-family: Georgia, serif; font-size: 2rem; margin: 0 0 4px; }
  .tagline { color: var(--soft); margin: 0 0 16px; }
  nav { margin-bottom: 32px; font-size: .9rem; }
  nav a { color: var(--accent); text-decoration: none; margin-right: 16px; }
  nav a.current { color: var(--ink); font-weight: 600; pointer-events: none; }
  nav a:hover { text-decoration: underline; }

  textarea {
    width: 100%; min-height: 180px; resize: vertical;
    font: inherit; color: inherit;
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px 18px;
  }
  textarea:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
  .actions { display: flex; align-items: center; gap: 14px; margin-top: 12px; }
  #go {
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 12px 22px; font-size: 1rem; font-weight: 600;
    cursor: pointer;
  }
  #go:hover { filter: brightness(1.08); }
  #go:disabled { opacity: .5; cursor: default; }
  .kbd-hint { color: var(--soft); font-size: .85rem; }

  #loading { display: none; text-align: center; padding: 36px 0; }
  .spinner {
    width: 36px; height: 36px; margin: 0 auto 16px;
    border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { color: var(--soft); }

  #error-box {
    display: none;
    background: #fdf0ef; border: 1px solid #eccfcb; color: #8a3a2e;
    border-radius: var(--radius); padding: 16px 20px; margin-top: 24px;
  }

  #results { display: none; }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px 24px; margin-top: 20px;
  }
  .label {
    display: inline-block; font-size: .75rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  .para { font-family: Georgia, serif; font-size: 1.05rem; margin: 0; white-space: pre-wrap; }
  .card-head { display: flex; justify-content: space-between; align-items: baseline; }
  #copy {
    background: none; border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 14px; cursor: pointer; font-size: .85rem; color: var(--soft);
  }
  #copy:hover { border-color: var(--accent); color: var(--accent); }
  ul.suggestions { list-style: none; padding: 0; margin: 0; }
  ul.suggestions li { padding: 8px 0 8px 24px; position: relative; }
  ul.suggestions li::before {
    content: "✎"; position: absolute; left: 0; color: var(--accent);
  }
</style>
</head>
<body>
<main>
  <h1>Paper Brain</h1>
  <p class="tagline">Dump your rough thoughts. Get them back in academic voice — with the reasoning shown.</p>
  <nav>
    <a href="/">Read a paper</a>
    <a href="/write" class="current">Notes → paragraph</a>
    <a href="/lab">Meeting → actions</a>
  </nav>

  <textarea id="notes" placeholder="Paste rough notes, bullets, or stream-of-consciousness here. Every idea you include will survive the translation — nothing gets added, nothing gets dropped."></textarea>
  <div class="actions">
    <button id="go">Make it academic</button>
    <span class="kbd-hint">or press ⌘+Enter</span>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Translating into academese…</p>
  </div>

  <div id="error-box"></div>

  <div id="results">
    <div class="card">
      <div class="card-head">
        <span class="label">Your paragraph</span>
        <button id="copy">Copy</button>
      </div>
      <p class="para" id="paragraph"></p>
    </div>

    <div class="card">
      <span class="label">What changed and why</span>
      <ul class="suggestions" id="suggestions"></ul>
    </div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);

const LOADING_MSGS = [
  "Translating into academese…",
  "Upgrading your vocabulary…",
  "Keeping every idea, fixing the register…",
];
let msgTimer = null;

function setLoading(on) {
  $("loading").style.display = on ? "block" : "none";
  $("go").disabled = on;
  if (on) {
    let i = 0;
    $("loading-msg").textContent = LOADING_MSGS[0];
    msgTimer = setInterval(() => {
      i = (i + 1) % LOADING_MSGS.length;
      $("loading-msg").textContent = LOADING_MSGS[i];
    }, 3500);
  } else if (msgTimer) {
    clearInterval(msgTimer);
    msgTimer = null;
  }
}

function showError(msg) {
  const box = $("error-box");
  box.textContent = msg;
  box.style.display = "block";
}

async function rewrite() {
  const notes = $("notes").value.trim();
  if (!notes) {
    showError("Write or paste some notes first — even messy ones.");
    return;
  }
  $("error-box").style.display = "none";
  $("results").style.display = "none";
  setLoading(true);
  try {
    const res = await fetch("/api/rewrite", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ notes }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    $("paragraph").textContent = data.paragraph;
    const ul = $("suggestions");
    ul.innerHTML = "";
    (data.suggestions || []).forEach((s) => {
      const li = document.createElement("li");
      li.textContent = s;
      ul.appendChild(li);
    });
    $("results").style.display = "block";
  } catch (err) {
    showError(err.message || "Something went wrong. Try again.");
  } finally {
    setLoading(false);
  }
}

$("go").addEventListener("click", rewrite);
$("notes").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") rewrite();
});
$("copy").addEventListener("click", async () => {
  await navigator.clipboard.writeText($("paragraph").textContent);
  $("copy").textContent = "Copied!";
  setTimeout(() => ($("copy").textContent = "Copy"), 1500);
});
</script>
</body>
</html>
